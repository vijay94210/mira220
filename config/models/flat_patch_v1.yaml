# Main calibration model used by default.
# It corrects Mira220 raw Red, Green, and IR measurements into reflectance-like
# values anchored to four flat-spectrum target patches.
name: flat_patch_v1
description: Post-demosaic quadratic R/G/IR correction anchored to four flat-spectrum patches.
preprocessing:
  # openRGB-IR settings expected when this model is used.
  irc_cut: 0.0
  awb: false
  ccm: false
  sensor_bit_depth: 12
provenance:
  # Source files used when this model was fitted.
  mira_raw: C:/Users/jayal/OneDrive/unearthed/mira220/20260604/2026-06-04_19_48_23.raw
  gold_tiff: C:/Users/jayal/OneDrive/unearthed/mira220/20260604/Survey3N_RGN/tiff16/Reflectance_Calibrated_Images/2026_0604_194919_003.tif
  gold_channels:
    red: 0
    green: 1
    ir: 2
display:
  # NDVI preview display range. The TIFF keeps full float NDVI values.
  ndvi_min: -0.2
  ndvi_max: 0.7
patch_targets:
  # Target reflectance values learned from the trusted gold-camera image.
  - {name: P1, reflectance: 0.7406067848205566}
  - {name: P2, reflectance: 0.6783372759819031}
  - {name: P3, reflectance: 0.31364917755126953}
  - {name: P4, reflectance: 0.26429644227027893}
correction:
  # Coefficients for the equations in docs/pipeline.md.
  red:
    features: [raw_red, raw_ir, raw_ir_squared, constant]
    coefficients: [2.7299981117248535, -5.599003314971924, 3.921675205230713, 0.3154758810997009]
  green:
    features: [raw_green, raw_ir, raw_ir_squared, constant]
    coefficients: [0.16808825731277466, 0.20669932663440704, 0.3978048264980316, 0.12400773167610168]
  ir:
    features: [raw_ir, raw_ir_squared, constant]
    coefficients: [0.650101363658905, 0.027597997337579727, 0.15592704713344574]
validation:
  # Patch NDVI values after applying the model back to the calibration capture.
  max_abs_patch_ndvi: 0.021444514278240394
  patch_results:
    - {name: P1, red: 0.7407805323600769, green: 0.7406499981880188, ir: 0.7353065013885498, ndvi: -0.003708471884041647}
    - {name: P2, red: 0.6853399872779846, green: 0.6783765554428101, ir: 0.6850287318229675, ndvi: -0.0002271324670113791}
    - {name: P3, red: 0.31463444232940674, green: 0.3135561943054199, ir: 0.3036981225013733, ndvi: -0.01768676398963786}
    - {name: P4, red: 0.26139944791793823, green: 0.26435011625289917, ir: 0.27285632491111755, ndvi: 0.021444514278240394}
